[workspace]
members = [
  "crates/agent",
  "crates/llm-providers/provider-core",
  "crates/llm-providers/provider-google",
  "crates/llm-providers/provider-openai",
  "crates/tools/tool-core",
  "crates/tools/tool-read-file",
  "crates/toon-schema",
  "crates/ts-bindings",
  # "crates/tui",
  "crates/types",
]
resolver = "3"

[workspace.package]
edition = "2024"
rust-version = "1.88.0"

[profile.release]
codegen-units = 1 # Allows compiler to perform better optimization.
lto = true        # Enables Link-time Optimization.
opt-level = "s"   # Prioritizes small binary size. Use `3` if you prefer speed.
strip = true      # Ensures debug symbols are removed.

[workspace.dependencies]
agent = { path = "crates/agent" }
provider-core = { path = "crates/llm-providers/provider-core" }
provider-google = { path = "crates/llm-providers/provider-google" }
provider-openai = { path = "crates/llm-providers/provider-openai" }
tool-core = { path = "crates/tools/tool-core" }
tool-read-file = { path = "crates/tools/tool-read-file" }
types = { path = "crates/types" }

async-openai = { version = "0.32.4", features = [
  "byot",
  "chat-completion",
  "model",
] }
async-trait = "0.1.89"
chrono = { version = "0.4.43", features = ["serde"] }
color-eyre = "0.6.5"
directories = "6.0.0"
futures = "0.3.31"
llm-toolkit = "0.61.1"
proc-macro2 = "1.0.106"
quote = "1.0.44"
ratatui = { version = "0.30.0", features = [
  "all-widgets",
  "macros",
  "scrolling-regions",
  "serde",
] }
regex = "1.12.3"
reqwest = { features = ["json", "stream"], version = "0.13.1" }
serde = { features = ["derive"], version = "1.0.228" }
serde_json = "1.0.149"
specta = "2.0.0-rc.22"
specta-typescript = "0.0.9"
syn = { version = "2.0.114", features = ["derive", "full"] }
tachyonfx = "0.23.0"
tauri = "2.10.2"
tauri-specta = { version = "2.0.0-rc.21", features = ["derive", "typescript"] }
textwrap = "0.16"
tokio = { features = ["full"], version = "1.49.0" }
toml = "0.9.11"
toon-format = "0.4.1"
trybuild = "1.0.115"
url = "2.5.8"
