[workspace]
members = [
  "crates/cli",
  "crates/llm-providers/provider-core",
  "crates/llm-providers/provider-mistralrs",
]
resolver = "3"

[workspace.package]
edition = "2024"
rust-version = "1.87.0"

[workspace.dependencies]
anyhow = "1.0.100"
async-trait = "0.1.89"
color-eyre = "0.6.5"
futures = "0.3.31"
mistralrs = { git = "https://github.com/EricLBuehler/mistral.rs.git" }
regex = "1.12.2"
reqwest = { features = ["json", "stream"], version = "0.12.24" }
serde = { features = ["derive"], version = "1.0.228" }
serde_json = "1.0.145"
tokio = { features = ["full"], version = "1.48.0" }
toml = "0.9.8"
toon-format = "0.4.0"
url = "2.5.7"
