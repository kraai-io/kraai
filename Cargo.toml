[workspace]
members = [
	"crates/cli",
	"crates/llm-providers/provider-core",
	"crates/llm-providers/provider-google",
]
resolver = "3"

[workspace.package]
edition = "2024"
rust-version = "1.87.0"

[workspace.dependencies]
provider-core = { path = "./crates/llm-providers/provider-core" }
provider-google = { path = "./crates/llm-providers/provider-google" }

async-openai = { version = "0.31.1", features = [
	"byot",
	"chat-completion",
	"image",
	"embedding",
	"model",
] }
llm-toolkit = "0.58.0"
async-trait = "0.1.89"
color-eyre = "0.6.5"
futures = "0.3.31"
regex = "1.12.2"
reqwest = { features = ["json", "stream"], version = "0.12.24" }
serde = { features = ["derive"], version = "1.0.228" }
serde_json = "1.0.145"
tokio = { features = ["full"], version = "1.48.0" }
toml = "0.9.8"
toon-format = "0.4.0"
url = "2.5.7"
