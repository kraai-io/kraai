[package]
edition.workspace = true
name = "toon-schema"
rust-version.workspace = true
version = "0.1.0"

[lib]
proc-macro = true

[dependencies]
proc-macro2 = "1.0.106"
quote = "1.0.44"
syn = { version = "2.0.114", features = ["full", "derive"] }
serde = { workspace = true }
serde_json = { workspace = true }
toon-format = { workspace = true }

[dev-dependencies]
trybuild = "1.0.115"
serde = { workspace = true, features = ["derive"] }
